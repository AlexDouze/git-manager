name: Test

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true

      - name: Check formatting
        run: test -z "$(gofmt -l .)" || (echo "The following files are not gofmt-clean:"; gofmt -l .; exit 1)

      - name: Vet
        run: go vet ./...

      - name: Run tests
        run: go test -v ./...
